name: India PM Domestic Visits Scraper

on:
  schedule:
    # Runs on the 1st and 15th of every month at 06:00 UTC (11:30 AM IST)
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run domestic visits scraper
        run: python domestic_scraper.py

      - name: Commit updated CSV to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: " domestic PM visits update"
          file_pattern: "pm_domestic_visits.csv"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
